<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Magic Diary Scribble Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Zhi+Mang+Xing&family=Long+Cang&display=swap');

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7d3;
    color: #2A1A12;
    font-family: Georgia, "Times New Roman", serif;
}

body {
    background:
        radial-gradient(circle at 50% 12%, rgba(98, 68, 38, 0.08), transparent 28%),
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(118, 89, 54, 0.026) 3px,
            rgba(118, 89, 54, 0.026) 5px
        ),
        #efe7d3;
}

.page {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

.title {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: min(820px, 86vw);
    text-align: center;
    color: rgba(63, 43, 32, 0.62);
    font-family: "Cinzel Decorative", Georgia, serif;
    font-size: clamp(15px, 2vw, 22px);
    line-height: 1.5;
    pointer-events: none;
}

.test-row {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: min(900px, 88vw);
    display: grid;
    grid-template-columns: 1fr;
    gap: 34px;
}

.test-row.a {
    top: 18vh;
}

.test-row.b {
    top: 56vh;
}

.label {
    color: rgba(74, 47, 32, 0.34);
    font-size: 13px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: "Cinzel Decorative", Georgia, serif;
}

.writing-area {
    width: 100%;
    min-height: 190px;
    padding: 0;
    margin: 0;

    border: none;
    outline: none;
    resize: none;
    overflow: hidden;

    background: transparent;
    box-shadow: none;

    color: #2A1A12;
    font-family: "Cinzel Decorative", "Zhi Mang Xing", "Long Cang", cursive;
    font-size: clamp(24px, 4.8vw, 42px);
    line-height: 1.55;
    letter-spacing: 0.4px;

    -webkit-appearance: none;
    appearance: none;
    -webkit-user-select: text;
    user-select: text;
}

/* A：完全隐藏光标 */
#scribbleA {
    caret-color: transparent;
}

/* B：保留极淡光标 */
#scribbleB {
    caret-color: rgba(91, 31, 31, 0.22);
}

.writing-area::placeholder {
    color: transparent;
    opacity: 0;
}

.writing-area:focus {
    outline: none;
    border: none;
    background: transparent;
    box-shadow: none;
}

.note {
    position: fixed;
    left: 18px;
    bottom: 16px;
    max-width: min(720px, 86vw);
    color: rgba(72, 45, 31, 0.46);
    font-size: 14px;
    line-height: 1.55;
    pointer-events: none;
}

.clear-buttons {
    position: fixed;
    right: 18px;
    bottom: 18px;
    display: flex;
    gap: 8px;
}

.clear-buttons button {
    border: 1px solid rgba(82, 51, 30, 0.18);
    background: rgba(255, 250, 238, 0.48);
    border-radius: 999px;
    padding: 7px 12px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    color: rgba(70, 40, 26, 0.58);
}

@media (max-width: 768px) {
    .title {
        top: 14px;
        font-size: 13px;
    }

    .test-row {
        width: 86vw;
    }

    .test-row.a {
        top: 15vh;
    }

    .test-row.b {
        top: 53vh;
    }

    .writing-area {
        min-height: 210px;
        font-size: clamp(28px, 7.2vw, 48px);
        line-height: 1.5;
    }

    .note {
        font-size: 12px;
        bottom: 12px;
        max-width: 62vw;
    }
}
</style>
</head>
<body>
<div class="page">
    <div class="title">
        Apple Pencil Scribble Test<br>
        Write with Apple Pencil directly on the paper.
    </div>

    <div class="test-row a">
        <div class="label">A / hidden cursor</div>
        <textarea id="scribbleA" class="writing-area" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>

    <div class="test-row b">
        <div class="label">B / faint cursor</div>
        <textarea id="scribbleB" class="writing-area" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>

    <div class="note">
        Test on iPad Safari. Try: “hello Tom” and “你好 Tom”.<br>
        Tell me whether A or B recognizes better.
    </div>

    <div class="clear-buttons">
        <button onclick="clearBox('scribbleA')">Clear A</button>
        <button onclick="clearBox('scribbleB')">Clear B</button>
    </div>
</div>

<script>
function clearBox(id) {
    const el = document.getElementById(id);
    if (el) {
        el.value = "";
        el.focus();
    }
}

function autoGrow(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, Math.floor(window.innerHeight * 0.38)) + "px";
}

document.querySelectorAll(".writing-area").forEach(function(el) {
    el.addEventListener("input", function() {
        autoGrow(el);
    });

    el.addEventListener("focus", function() {
        autoGrow(el);
    });

    el.addEventListener("pointerdown", function() {
        setTimeout(function() {
            try {
                el.focus({ preventScroll: true });
            } catch(e) {
                el.focus();
            }
        }, 20);
    });
});
</script>
</body>
</html>
