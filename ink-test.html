<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ink Test</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7d3;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
}

body {
    background:
        radial-gradient(circle at 50% 12%, rgba(98, 68, 38, 0.08), transparent 28%),
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(118, 89, 54, 0.026) 3px,
            rgba(118, 89, 54, 0.026) 5px
        ),
        #efe7d3;
}

#paper {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    display: block;
    touch-action: none;
    cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="paper"></canvas>

<script>
(function () {
    const canvas = document.getElementById("paper");
    const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });

    let dpr = 1;
    let drawing = false;
    let activePointerId = null;
    let last = null;
    let strokes = [];
    let currentStroke = null;
    let saveTimer = null;

    function resizeCanvas() {
        dpr = Math.max(1, window.devicePixelRatio || 1);

        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        redraw();
    }

    function getPoint(e) {
        let pressure = e.pressure;
        if (!pressure || pressure <= 0) pressure = 0.42;

        return {
            x: e.clientX,
            y: e.clientY,
            p: pressure,
            t: Date.now()
        };
    }

    function distance(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function drawDot(p) {
        const r = 1.3 + p.p * 2.4;

        ctx.save();
        ctx.fillStyle = "rgba(43, 22, 14, 0.86)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawSegment(a, b) {
        const dist = distance(a, b);
        if (dist < 0.08) {
            drawDot(b);
            return;
        }

        const steps = Math.max(1, Math.ceil(dist / 2.2));
        let prev = a;

        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const p = {
                x: a.x + (b.x - a.x) * t,
                y: a.y + (b.y - a.y) * t,
                p: a.p + (b.p - a.p) * t
            };

            const width = 1.15 + p.p * 3.6;

            ctx.save();
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = "rgba(43, 22, 14, 0.86)";
            ctx.lineWidth = width;

            ctx.beginPath();
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();

            ctx.restore();
            prev = p;
        }
    }

    function redraw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        for (const stroke of strokes) {
            if (!stroke.length) continue;
            drawDot(stroke[0]);
            for (let i = 1; i < stroke.length; i++) {
                drawSegment(stroke[i - 1], stroke[i]);
            }
        }
    }

    function scheduleSave() {
        if (saveTimer) return;

        saveTimer = setTimeout(function() {
            saveTimer = null;
            try {
                localStorage.setItem("magicInkTestStrokesV2", JSON.stringify(strokes));
            } catch (e) {}
        }, 650);
    }

    function saveNow() {
        if (saveTimer) {
            clearTimeout(saveTimer);
            saveTimer = null;
        }

        try {
            localStorage.setItem("magicInkTestStrokesV2", JSON.stringify(strokes));
        } catch (e) {}
    }

    function load() {
        try {
            const saved = localStorage.getItem("magicInkTestStrokesV2");
            if (saved) strokes = JSON.parse(saved) || [];
        } catch (e) {
            strokes = [];
        }
    }

    function handlePoint(p) {
        if (!currentStroke || !last) return;

        // 太近的点不重复存，但仍补小点，避免看起来断
        if (distance(last, p) < 0.18) {
            drawDot(p);
            return;
        }

        drawSegment(last, p);
        currentStroke.push(p);
        last = p;
    }

    function collectEvents(e) {
        if (typeof e.getCoalescedEvents === "function") {
            const events = e.getCoalescedEvents();
            if (events && events.length) return events;
        }

        return [e];
    }

    function startDraw(e) {
        e.preventDefault();

        if (drawing) return;

        drawing = true;
        activePointerId = e.pointerId;

        try {
            canvas.setPointerCapture(e.pointerId);
        } catch (err) {}

        const p = getPoint(e);
        currentStroke = [p];
        strokes.push(currentStroke);
        last = p;

        drawDot(p);
    }

    function moveDraw(e) {
        if (!drawing || e.pointerId !== activePointerId) return;
        e.preventDefault();

        const events = collectEvents(e);

        for (const item of events) {
            handlePoint(getPoint(item));
        }

        scheduleSave();
    }

    function endDraw(e) {
        if (!drawing || e.pointerId !== activePointerId) return;
        e.preventDefault();

        const events = collectEvents(e);
        for (const item of events) {
            handlePoint(getPoint(item));
        }

        drawing = false;
        activePointerId = null;
        last = null;
        currentStroke = null;
        saveNow();

        try {
            canvas.releasePointerCapture(e.pointerId);
        } catch (err) {}
    }

    canvas.addEventListener("pointerdown", startDraw, { passive: false });
    canvas.addEventListener("pointermove", moveDraw, { passive: false });

    if ("onpointerrawupdate" in window) {
        canvas.addEventListener("pointerrawupdate", moveDraw, { passive: false });
    }

    canvas.addEventListener("pointerup", endDraw, { passive: false });
    canvas.addEventListener("pointercancel", endDraw, { passive: false });

    // 先不监听 pointerleave，避免 iPad 轻微边缘判断导致中途断笔

    // 三指双击清空
    let clearTapCount = 0;
    canvas.addEventListener("touchend", function(e) {
        if (e.changedTouches && e.changedTouches.length >= 3) {
            clearTapCount++;
            setTimeout(function() {
                clearTapCount = 0;
            }, 450);

            if (clearTapCount >= 2) {
                strokes = [];
                currentStroke = null;
                last = null;
                localStorage.removeItem("magicInkTestStrokesV2");
                redraw();
                clearTapCount = 0;
            }
        }
    }, { passive: false });

    load();
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
})();
</script>
</body>
</html>
