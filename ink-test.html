<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Ink Test</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7d3;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

body {
    background:
        radial-gradient(circle at 50% 12%, rgba(98, 68, 38, 0.08), transparent 28%),
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(118, 89, 54, 0.026) 3px,
            rgba(118, 89, 54, 0.026) 5px
        ),
        #efe7d3;
}

#paper {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    display: block;
    touch-action: none;
}

/* 没有提示词、没有按钮、没有光标 */
</style>
</head>
<body>
<canvas id="paper"></canvas>

<script>
(function () {
    const canvas = document.getElementById("paper");
    const ctx = canvas.getContext("2d", { alpha: true });

    let dpr = 1;
    let drawing = false;
    let activePointerId = null;
    let points = [];
    let strokes = [];

    function resizeCanvas() {
        dpr = Math.max(1, window.devicePixelRatio || 1);

        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        redrawAll();
    }

    function isApplePencil(e) {
        /*
           iPad Safari: Apple Pencil usually reports pointerType === "pen".
           Palm/finger reports "touch".
           We ignore touch completely.
        */
        return e.pointerType === "pen";
    }

    function preventTouch(e) {
        /*
           手掌/手指只负责被忽略，不能滚动页面，不能触发别的东西。
        */
        e.preventDefault();
    }

    document.addEventListener("touchstart", preventTouch, { passive: false });
    document.addEventListener("touchmove", preventTouch, { passive: false });
    document.addEventListener("touchend", preventTouch, { passive: false });

    function pointFromEvent(e) {
        let pressure = e.pressure;
        if (!pressure || pressure <= 0) pressure = 0.45;

        return {
            x: e.clientX,
            y: e.clientY,
            p: pressure,
            t: performance.now()
        };
    }

    function dist(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function mid(a, b) {
        return {
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2,
            p: (a.p + b.p) / 2
        };
    }

    function lineWidth(p) {
        return 1.45 + p * 3.4;
    }

    function drawDot(p) {
        ctx.save();
        ctx.fillStyle = "rgba(43, 22, 14, 0.88)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, lineWidth(p.p) * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawSmoothSegment(p0, p1, p2) {
        const m1 = mid(p0, p1);
        const m2 = mid(p1, p2);

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(43, 22, 14, 0.88)";
        ctx.lineWidth = lineWidth(p1.p);

        ctx.beginPath();
        ctx.moveTo(m1.x, m1.y);
        ctx.quadraticCurveTo(p1.x, p1.y, m2.x, m2.y);
        ctx.stroke();

        ctx.restore();
    }

    function drawDirectSegment(a, b) {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(43, 22, 14, 0.88)";
        ctx.lineWidth = lineWidth(b.p);

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();

        ctx.restore();
    }

    function addInterpolatedPoint(p) {
        if (!points.length) {
            points.push(p);
            drawDot(p);
            return;
        }

        const last = points[points.length - 1];
        const d = dist(last, p);

        /*
           横线写不上，很多时候是采样点之间距离太大。
           这里强行补中间点。
        */
        const steps = Math.max(1, Math.ceil(d / 1.6));

        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const q = {
                x: last.x + (p.x - last.x) * t,
                y: last.y + (p.y - last.y) * t,
                p: last.p + (p.p - last.p) * t,
                t: p.t
            };

            points.push(q);

            const n = points.length;
            if (n >= 3) {
                drawSmoothSegment(points[n - 3], points[n - 2], points[n - 1]);
            } else if (n >= 2) {
                drawDirectSegment(points[n - 2], points[n - 1]);
            }
        }
    }

    function collectEvents(e) {
        if (typeof e.getCoalescedEvents === "function") {
            const events = e.getCoalescedEvents();
            if (events && events.length) return events;
        }

        return [e];
    }

    function startDraw(e) {
        if (!isApplePencil(e)) {
            e.preventDefault();
            return;
        }

        e.preventDefault();

        drawing = true;
        activePointerId = e.pointerId;
        points = [];

        try {
            canvas.setPointerCapture(e.pointerId);
        } catch (err) {}

        addInterpolatedPoint(pointFromEvent(e));
    }

    function moveDraw(e) {
        if (!drawing || e.pointerId !== activePointerId) {
            e.preventDefault();
            return;
        }

        if (!isApplePencil(e)) {
            e.preventDefault();
            return;
        }

        e.preventDefault();

        const events = collectEvents(e);
        for (const item of events) {
            addInterpolatedPoint(pointFromEvent(item));
        }
    }

    function endDraw(e) {
        if (!drawing || e.pointerId !== activePointerId) {
            e.preventDefault();
            return;
        }

        e.preventDefault();

        const events = collectEvents(e);
        for (const item of events) {
            addInterpolatedPoint(pointFromEvent(item));
        }

        drawing = false;
        activePointerId = null;

        if (points.length) {
            strokes.push(points.slice());
        }

        points = [];

        try {
            canvas.releasePointerCapture(e.pointerId);
        } catch (err) {}

        saveLater();
    }

    function redrawStroke(stroke) {
        if (!stroke || !stroke.length) return;

        drawDot(stroke[0]);

        for (let i = 1; i < stroke.length; i++) {
            if (i >= 2) {
                drawSmoothSegment(stroke[i - 2], stroke[i - 1], stroke[i]);
            } else {
                drawDirectSegment(stroke[i - 1], stroke[i]);
            }
        }
    }

    function redrawAll() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        strokes.forEach(redrawStroke);
    }

    let saveTimer = null;

    function saveLater() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function() {
            try {
                localStorage.setItem("magicInkTestStrokesV3", JSON.stringify(strokes));
            } catch (e) {}
        }, 500);
    }

    function loadSaved() {
        try {
            const saved = localStorage.getItem("magicInkTestStrokesV3");
            if (saved) strokes = JSON.parse(saved) || [];
        } catch (e) {
            strokes = [];
        }
    }

    canvas.addEventListener("pointerdown", startDraw, { passive: false });
    canvas.addEventListener("pointermove", moveDraw, { passive: false });

    if ("onpointerrawupdate" in window) {
        canvas.addEventListener("pointerrawupdate", moveDraw, { passive: false });
    }

    canvas.addEventListener("pointerup", endDraw, { passive: false });
    canvas.addEventListener("pointercancel", endDraw, { passive: false });

    loadSaved();
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
})();
</script>
</body>
</html>
