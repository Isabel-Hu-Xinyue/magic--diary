<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ink Test</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7d3;
    touch-action: none;
    overscroll-behavior: none;
}

body {
    background:
        radial-gradient(circle at 50% 12%, rgba(98, 68, 38, 0.08), transparent 28%),
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(118, 89, 54, 0.026) 3px,
            rgba(118, 89, 54, 0.026) 5px
        ),
        #efe7d3;
}

#paper {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    display: block;
    touch-action: none;
    cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="paper"></canvas>

<script>
(function () {
    const canvas = document.getElementById("paper");
    const ctx = canvas.getContext("2d", { alpha: true });

    let drawing = false;
    let last = null;
    let strokes = [];

    function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const old = canvas.toDataURL();

        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        redraw();
    }

    function getPoint(e) {
        return {
            x: e.clientX,
            y: e.clientY,
            pressure: e.pressure && e.pressure > 0 ? e.pressure : 0.45
        };
    }

    function drawSegment(a, b) {
        const pressure = b.pressure || 0.45;
        const width = 1.2 + pressure * 3.8;

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(43, 22, 14, 0.86)";
        ctx.lineWidth = width;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);

        const midX = (a.x + b.x) / 2;
        const midY = (a.y + b.y) / 2;
        ctx.quadraticCurveTo(a.x, a.y, midX, midY);

        ctx.stroke();
        ctx.restore();
    }

    function redraw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        for (const stroke of strokes) {
            for (let i = 1; i < stroke.length; i++) {
                drawSegment(stroke[i - 1], stroke[i]);
            }
        }
    }

    function save() {
        try {
            localStorage.setItem("magicInkTestStrokes", JSON.stringify(strokes));
        } catch (e) {}
    }

    function load() {
        try {
            const saved = localStorage.getItem("magicInkTestStrokes");
            if (saved) strokes = JSON.parse(saved) || [];
        } catch (e) {
            strokes = [];
        }
    }

    canvas.addEventListener("pointerdown", function(e) {
        e.preventDefault();

        drawing = true;
        canvas.setPointerCapture(e.pointerId);

        const p = getPoint(e);
        last = p;
        strokes.push([p]);
        save();
    });

    canvas.addEventListener("pointermove", function(e) {
        if (!drawing || !last) return;
        e.preventDefault();

        const p = getPoint(e);
        drawSegment(last, p);

        strokes[strokes.length - 1].push(p);
        last = p;
        save();
    });

    function endDraw(e) {
        if (!drawing) return;
        e.preventDefault();

        drawing = false;
        last = null;
        save();
    }

    canvas.addEventListener("pointerup", endDraw);
    canvas.addEventListener("pointercancel", endDraw);
    canvas.addEventListener("pointerleave", endDraw);

    // 三指双击清空，平时页面没有按钮
    let tapCount = 0;
    canvas.addEventListener("touchend", function(e) {
        if (e.touches.length === 0 && e.changedTouches.length >= 3) {
            tapCount++;
            setTimeout(() => tapCount = 0, 450);
            if (tapCount >= 2) {
                strokes = [];
                localStorage.removeItem("magicInkTestStrokes");
                redraw();
                tapCount = 0;
            }
        }
    });

    load();
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
})();
</script>
</body>
</html>
