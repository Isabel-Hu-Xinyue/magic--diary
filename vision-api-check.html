<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Vision API Check</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #efe7d3;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}

body {
    font-family: Georgia, "Times New Roman", serif;
    background:
        radial-gradient(circle at 50% 15%, rgba(98, 68, 38, 0.08), transparent 30%),
        repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(118, 89, 54, 0.026) 3px,
            rgba(118, 89, 54, 0.026) 5px
        ),
        #efe7d3;
}

#paper {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    display: block;
    touch-action: none;
}

#panel {
    position: fixed;
    left: 14px;
    right: 14px;
    bottom: 14px;
    z-index: 10;

    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(255, 250, 238, 0.84);
    border: 1px solid rgba(72, 43, 28, 0.18);
    color: rgba(44, 25, 18, 0.82);

    font-size: 13px;
    line-height: 1.4;
}

.row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
}

input {
    min-width: 0;
    flex: 1;
    border: 1px solid rgba(72, 43, 28, 0.18);
    border-radius: 10px;
    padding: 7px 8px;
    background: rgba(255,255,255,0.72);
    font-family: inherit;
    font-size: 13px;
}

button {
    border: 1px solid rgba(72, 43, 28, 0.22);
    border-radius: 10px;
    padding: 7px 10px;
    background: rgba(255, 255, 255, 0.78);
    font-family: inherit;
    font-size: 13px;
}

#status {
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-word;
}

.hint {
    opacity: 0.7;
    font-size: 12px;
}
</style>
</head>
<body>
<canvas id="paper"></canvas>

<div id="panel">
    <div class="row">
        <input id="apiUrl" placeholder="Vision API URL, e.g. https://api.openai.com/v1/chat/completions">
    </div>
    <div class="row">
        <input id="apiKey" placeholder="API Key，只在这个页面临时输入，不要写进代码">
    </div>
    <div class="row">
        <input id="model" value="gpt-4o-mini" placeholder="Model">
        <button id="testBtn">Test</button>
        <button id="clearBtn">Clear</button>
    </div>
    <div class="hint">Apple Pencil 写几个字，然后点 Test。这个页面只检测视觉接口，不接 Tom。</div>
    <div id="status">Ready.</div>
</div>

<script>
(function () {
    const canvas = document.getElementById("paper");
    const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });

    const statusEl = document.getElementById("status");
    const apiUrlEl = document.getElementById("apiUrl");
    const apiKeyEl = document.getElementById("apiKey");
    const modelEl = document.getElementById("model");
    const testBtn = document.getElementById("testBtn");
    const clearBtn = document.getElementById("clearBtn");

    let dpr = 1;
    let drawing = false;
    let activePointerId = null;

    let strokes = [];
    let stroke = [];
    let lastSmooth = null;
    let lastWidth = null;

    function setStatus(text) {
        statusEl.textContent = text;
    }

    function resizeCanvas() {
        dpr = Math.max(1, window.devicePixelRatio || 1);

        const w = Math.ceil((window.visualViewport && window.visualViewport.width) || window.innerWidth);
        const h = Math.ceil((window.visualViewport && window.visualViewport.height) || window.innerHeight);

        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        redrawAll();
    }

    function isPen(e) {
        return e.pointerType === "pen" || e.pointerType === "mouse";
    }

    function point(e) {
        let pressure = e.pressure;
        if (!pressure || pressure <= 0) pressure = 0.45;

        return {
            x: e.clientX,
            y: e.clientY,
            p: pressure
        };
    }

    function dist(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function smoothPoint(p) {
        if (!lastSmooth) {
            lastSmooth = { x: p.x, y: p.y, p: p.p };
            return lastSmooth;
        }

        const follow = 0.34;

        lastSmooth = {
            x: lerp(lastSmooth.x, p.x, follow),
            y: lerp(lastSmooth.y, p.y, follow),
            p: lerp(lastSmooth.p, p.p, 0.24)
        };

        return lastSmooth;
    }

    function inkWidth(p) {
        const raw = 1.85 + p * 3.75;

        if (lastWidth == null) {
            lastWidth = raw;
            return raw;
        }

        lastWidth = lerp(lastWidth, raw, 0.22);
        return lastWidth;
    }

    function midpoint(a, b) {
        return {
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2,
            p: (a.p + b.p) / 2
        };
    }

    function drawDot(p) {
        const w = inkWidth(p.p);

        ctx.save();
        ctx.fillStyle = "rgba(43, 22, 14, 0.88)";
        ctx.shadowColor = "rgba(43, 22, 14, 0.18)";
        ctx.shadowBlur = 0.72;
        ctx.beginPath();
        ctx.arc(p.x, p.y, w * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawLine(a, b) {
        const w = inkWidth(b.p);

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(43, 22, 14, 0.88)";
        ctx.lineWidth = w;
        ctx.shadowColor = "rgba(43, 22, 14, 0.15)";
        ctx.shadowBlur = 0.85;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.restore();
    }

    function drawCurve(a, b, c) {
        const m1 = midpoint(a, b);
        const m2 = midpoint(b, c);
        const w = inkWidth(b.p);

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(43, 22, 14, 0.88)";
        ctx.lineWidth = w;
        ctx.shadowColor = "rgba(43, 22, 14, 0.15)";
        ctx.shadowBlur = 0.85;
        ctx.beginPath();
        ctx.moveTo(m1.x, m1.y);
        ctx.quadraticCurveTo(b.x, b.y, m2.x, m2.y);
        ctx.stroke();
        ctx.restore();
    }

    function addPoint(p) {
        const s = smoothPoint(p);

        if (!stroke.length) {
            stroke.push(s);
            drawDot(s);
            return;
        }

        const last = stroke[stroke.length - 1];
        const d = dist(last, s);

        if (d < 0.62) return;

        const steps = Math.max(1, Math.ceil(d / 3.1));

        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const q = {
                x: lerp(last.x, s.x, t),
                y: lerp(last.y, s.y, t),
                p: lerp(last.p, s.p, t)
            };

            stroke.push(q);
            drawLatest();
        }
    }

    function drawLatest() {
        const n = stroke.length;

        if (n === 1) {
            drawDot(stroke[0]);
        } else if (n === 2) {
            drawLine(stroke[0], stroke[1]);
        } else {
            drawCurve(stroke[n - 3], stroke[n - 2], stroke[n - 1]);
        }
    }

    function redrawStroke(s) {
        if (!s.length) return;

        lastWidth = null;
        drawDot(s[0]);

        for (let i = 1; i < s.length; i++) {
            if (i >= 2) {
                drawCurve(s[i - 2], s[i - 1], s[i]);
            } else {
                drawLine(s[i - 1], s[i]);
            }
        }

        lastWidth = null;
    }

    function redrawAll() {
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        strokes.forEach(redrawStroke);
    }

    function start(e) {
        if (!isPen(e)) return;
        e.preventDefault();

        drawing = true;
        activePointerId = e.pointerId;
        stroke = [];
        lastSmooth = null;
        lastWidth = null;

        try {
            canvas.setPointerCapture(e.pointerId);
        } catch (err) {}

        addPoint(point(e));
    }

    function move(e) {
        if (!drawing || e.pointerId !== activePointerId) return;
        if (!isPen(e)) return;
        e.preventDefault();

        const events = typeof e.getCoalescedEvents === "function" ? e.getCoalescedEvents() : [e];
        for (const item of events) addPoint(point(item));
    }

    function end(e) {
        if (!drawing || e.pointerId !== activePointerId) return;
        e.preventDefault();

        if (stroke.length) strokes.push(stroke.slice());

        drawing = false;
        activePointerId = null;
        stroke = [];
        lastSmooth = null;
        lastWidth = null;
    }

    function clearAll() {
        strokes = [];
        stroke = [];
        lastSmooth = null;
        lastWidth = null;
        redrawAll();
        setStatus("Cleared.");
    }

    function makeImage() {
        const temp = document.createElement("canvas");
        temp.width = canvas.width;
        temp.height = canvas.height;

        const tctx = temp.getContext("2d");

        tctx.fillStyle = "#efe7d3";
        tctx.fillRect(0, 0, temp.width, temp.height);
        tctx.drawImage(canvas, 0, 0);

        return temp.toDataURL("image/jpeg", 0.88);
    }

    async function testVision() {
        const apiUrl = apiUrlEl.value.trim();
        const apiKey = apiKeyEl.value.trim();
        const model = modelEl.value.trim();

        if (!apiUrl || !apiKey || !model) {
            setStatus("请先填 Vision API URL、API Key 和 Model。");
            return;
        }

        const imageUrl = makeImage();

        setStatus("Sending image to vision API...");

        const payload = {
            model: model,
            messages: [
                {
                    role: "system",
                    content: "You are a strict handwriting OCR engine. Return only the exact text you can read. If unreadable, return exactly: unreadable"
                },
                {
                    role: "user",
                    content: [
                        {
                            type: "text",
                            text: "Read the handwriting in this image. It may be Chinese, English, or mixed. Return only the text."
                        },
                        {
                            type: "image_url",
                            image_url: {
                                url: imageUrl,
                                detail: "high"
                            }
                        }
                    ]
                }
            ],
            temperature: 0,
            max_tokens: 300
        };

        try {
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + apiKey
                },
                body: JSON.stringify(payload)
            });

            const text = await response.text();

            if (!response.ok) {
                setStatus("FAILED HTTP " + response.status + "\\n" + text.slice(0, 900));
                return;
            }

            let data = null;
            try {
                data = JSON.parse(text);
            } catch (e) {
                setStatus("返回不是 JSON：\\n" + text.slice(0, 900));
                return;
            }

            const result =
                data &&
                data.choices &&
                data.choices[0] &&
                data.choices[0].message &&
                data.choices[0].message.content;

            setStatus("SUCCESS\\n识别结果：\\n" + (result || JSON.stringify(data).slice(0, 900)));

        } catch (err) {
            setStatus("REQUEST ERROR\\n" + (err && err.message ? err.message : String(err)));
        }
    }

    canvas.addEventListener("pointerdown", start, { passive: false });
    canvas.addEventListener("pointermove", move, { passive: false });

    if ("onpointerrawupdate" in window) {
        canvas.addEventListener("pointerrawupdate", move, { passive: false });
    }

    canvas.addEventListener("pointerup", end, { passive: false });
    canvas.addEventListener("pointercancel", end, { passive: false });

    testBtn.addEventListener("click", testVision);
    clearBtn.addEventListener("click", clearAll);

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeCanvas);
    }
})();
</script>
</body>
</html>
